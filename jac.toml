[project]
name = "care_anchor"
version = "0.1.0"
description = "Care Anchor — AI triage and provider matching"
entry-point = "main.jac"

[dependencies]
python-dotenv = ">=1.0.0"
requests = ">=2.31.0"
reportlab = ">=4.0.0"
twilio = ">=9.0.0"

[dependencies.npm]
react = "^18.2.0"
react-dom = "^18.2.0"
react-router-dom = "^6.22.0"
react-error-boundary = "^5.0.0"
react-hook-form = "^7.71.0"
zod = "^4.3.6"
"@hookform/resolvers" = "^5.2.2"
marked = "^9.1.6"
"@react-pdf/renderer" = "^4.3.3"
react-pdf-html = "^2.1.5"

[dependencies.npm.dev]
vite = "^6.4.1"
"@vitejs/plugin-react" = "^4.2.1"
typescript = "^5.3.3"
"@types/react" = "^18.2.0"
"@types/react-dom" = "^18.2.0"

[dev-dependencies]
watchdog = ">=3.0.0"

[serve]
base_route_app = "app"
port = 8000

[plugins.client]
port = 5173

[plugins.byllm.model]
default_model = "ollama/llama2-uncensored:7b"
